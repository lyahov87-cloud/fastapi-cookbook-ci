[tool.black]
line-length = 120
target-version = ['py311']
exclude = '''
/(
    \.git
  | \.venv
  | __pycache__
  | migrations
)/
'''

[tool.isort]
profile = "black"
line_length = 120

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disallow_untyped_defs = true
# Явно говорим mypy не проверять сторонние библиотеки и кэш
follow_imports = "skip"
exclude = ["venv", ".venv", "migrations", "site-packages"]

